esphome:
  name: wasserzaehler
  friendly_name: Wasserzähler

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wasserzaehler Fallback"
    password: !secret wifi_ap_password

captive_portal:

i2c:
  sda: GPIO0
  scl: GPIO1
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_value
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

globals:
  - id: blink_state
    type: bool
    initial_value: 'false'

  - id: show_manual_sent
    type: bool
    initial_value: 'false'

  # Nur seit Boot, nicht persistent.
  # Home Assistant soll daraus den dauerhaften Zähler bilden.
  - id: water_total
    type: int
    restore_value: false
    initial_value: '0'

  - id: last_pulse_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: flow_l_min
    type: float
    restore_value: false
    initial_value: '0.0'

script:
  - id: blink_pulse
    mode: restart
    then:
      - lambda: 'id(blink_state) = true;'
      - delay: 150ms
      - lambda: 'id(blink_state) = false;'

  - id: manual_sent_hint
    mode: restart
    then:
      - lambda: 'id(show_manual_sent) = true;'
      - delay: 2s
      - lambda: 'id(show_manual_sent) = false;'

text_sensor:
  # HA-Utility-Meter / korrigierter Zählerstand
  - platform: homeassistant
    id: ha_zaehlerstand
    entity_id: sensor.wasserzahler

switch:
  - platform: template
    name: "Touch Tastensperre"
    id: touch_lock
    icon: "mdi:lock"
    optimistic: true
    restore_mode: ALWAYS_OFF

button:
  - platform: restart
    name: "ESP Neustart"
    id: esp_restart_button
    icon: "mdi:restart"
    entity_category: diagnostic

binary_sensor:
  # Manueller +1-Liter-Button
  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
    name: "Button"
    id: btn
    internal: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_release:
      then:
        - if:
            condition:
              switch.is_off: touch_lock
            then:
              - lambda: |-
                  id(water_total) += 1;
                  id(raw_total).publish_state(id(water_total));
              - script.execute: blink_pulse
              - script.execute: manual_sent_hint
              - logger.log: "MANUAL +1 L"

  # Entprellter Wassersensor
  # 100 ms stabil AN = 1 Liter
  # 100 ms stabil AUS = wieder bereit für nächsten Liter
  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
      inverted: true
    name: "Wasser Impuls"
    id: water_pulse
    internal: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:
      then:
        - lambda: |-
            const uint32_t now = millis();

            if (id(last_pulse_ms) > 0) {
              const uint32_t dt = now - id(last_pulse_ms);

              if (dt > 0) {
                id(flow_l_min) = 60000.0f / (float) dt;
                id(flow).publish_state(id(flow_l_min));
              }
            }

            id(last_pulse_ms) = now;

            id(water_total) += 1;
            id(raw_total).publish_state(id(water_total));
        - logger.log: "SENSOR +1 L"
        - script.execute: blink_pulse

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 180°
    update_interval: 250ms
    lambda: |-
      if (id(ha_zaehlerstand).has_state()) {
        it.printf(0, 0, id(font_value), "%s", id(ha_zaehlerstand).state.c_str());
      } else {
        it.print(0, 5, id(font_small), "MISSING_ENTITY");
      }

      if (id(show_manual_sent)) {
        it.print(0, 42, id(font_small), "+1 gesendet");
      } else if (id(flow).has_state()) {
        it.printf(0, 42, id(font_small), "%.1f L/min", id(flow).state);
      } else {
        it.print(0, 42, id(font_small), "--.- L/min");
      }

      if (id(wifi_db).has_state()) {
        it.printf(76, 42, id(font_small), "%.0f dB", id(wifi_db).state);
      } else {
        it.print(76, 42, id(font_small), "-- dB");
      }

      if (id(blink_state)) {
        it.filled_circle(119, 9, 8);
      }

sensor:
  - platform: wifi_signal
    name: "WLAN"
    id: wifi_db
    update_interval: 60s
    entity_category: diagnostic

  # Ursprünglicher Name für den Durchfluss
  - platform: template
    name: "Durchfluss"
    id: flow
    unit_of_measurement: "L/min"
    icon: "mdi:water-pump"
    accuracy_decimals: 1
    device_class: volume_flow_rate
    state_class: measurement
    update_interval: 1s
    lambda: |-
      const uint32_t now = millis();

      if (id(last_pulse_ms) == 0) {
        id(flow_l_min) = 0.0f;
        return 0.0f;
      }

      if ((now - id(last_pulse_ms)) > 15000) {
        id(flow_l_min) = 0.0f;
        return 0.0f;
      }

      return id(flow_l_min);

  # Ursprünglicher Name, damit HA den Zähler wieder wie vorher aufgreift
  # Zählt nur seit Boot; HA kann Reset auf 0 bei total_increasing verarbeiten.
  - platform: template
    name: "Impulse gesamt"
    id: raw_total
    unit_of_measurement: "L"
    icon: "mdi:water"
    accuracy_decimals: 0
    device_class: water
    state_class: total_increasing
    update_interval: 10s
    lambda: |-
      return id(water_total);
