substitutions:
  # Entprellung fuer den induktiven Sensor. Der Zaehler liefert max. ca. 1 Hz.
  min_activation_duration: 800ms

esphome:
  name: wasserzaehler
  friendly_name: Wasserzähler

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wasserzaehler Fallback"
    password: !secret wifi_ap_password

captive_portal:

i2c:
  sda: GPIO0
  scl: GPIO1
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_value
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

globals:
  - id: blink_state
    type: bool
    initial_value: 'false'

script:
  - id: blink_pulse
    mode: restart
    then:
      - lambda: 'id(blink_state) = true;'
      - delay: 150ms
      - lambda: 'id(blink_state) = false;'
  - id: pulse_plus
    mode: queued
    then:
      - sensor.template.publish:
          id: water_pulse_delta
          state: 1
      - script.execute: blink_pulse

text_sensor:
  # TODO: durch echte HA-utility_meter-Entity ersetzen.
  - platform: homeassistant
    id: ha_zaehlerstand
    entity_id: sensor.wasserzaehler_total

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
    name: "Button"
    id: btn
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_release:
      then:
        - script.execute: pulse_plus
        - logger.log: "MANUAL +1 L"

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 180°
    update_interval: 250ms
    lambda: |-
      if (id(ha_zaehlerstand).has_state()) {
        it.printf(0, 0, id(font_value), "%s", id(ha_zaehlerstand).state.c_str());
      } else {
        it.print(0, 5, id(font_small), "MISSING_ENTITY");
      }
      if (id(flow).has_state()) {
        it.printf(0, 42, id(font_small), "%.1f L/min", id(flow).state);
      } else {
        it.print(0, 42, id(font_small), "--.- L/min");
      }
      if (id(wifi_db).has_state()) {
        it.printf(76, 42, id(font_small), "%.0f dB", id(wifi_db).state);
      } else {
        it.print(76, 42, id(font_small), "-- dB");
      }
      if (id(blink_state)) {
        it.filled_circle(119, 9, 8);
      }

sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    id: wifi_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: pulse_meter
    name: "Wasser Durchfluss"
    id: flow
    pin:
      number: GPIO21
      mode:
        input: true
      inverted: true
    internal_filter: $min_activation_duration
    internal_filter_mode: PULSE
    timeout: 5min
    unit_of_measurement: "L/min"
    icon: "mdi:water-pump"
    accuracy_decimals: 1
    total:
      id: raw_total
      internal: true
      on_value:
        then:
          - script.execute: pulse_plus

  - platform: template
    name: "Wasser Impuls Delta"
    id: water_pulse_delta
    unit_of_measurement: "L"
    icon: "mdi:water"
    accuracy_decimals: 0
    update_interval: never
