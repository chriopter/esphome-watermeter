esphome:
  name: wasserzaehler
  friendly_name: Wasserzähler

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wasserzaehler Fallback"
    password: !secret wifi_ap_password

captive_portal:

i2c:
  sda: GPIO0
  scl: GPIO1
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

globals:
  - id: pulse_offset
    type: int
    initial_value: '0'
  - id: blink_state
    type: bool
    initial_value: 'false'
  - id: show_hint
    type: bool
    initial_value: 'false'

script:
  - id: blink_pulse
    mode: restart
    then:
      - lambda: 'id(blink_state) = true;'
      - delay: 150ms
      - lambda: 'id(blink_state) = false;'
  - id: hint_doubletap
    mode: restart
    then:
      - lambda: 'id(show_hint) = true;'
      - delay: 2s
      - lambda: 'id(show_hint) = false;'

text_sensor:
  # TODO: durch echte HA-utility_meter-Entity ersetzen.
  - platform: homeassistant
    id: ha_zaehlerstand
    entity_id: sensor.wasserzaehler_total

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
    name: "Button"
    id: btn
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_multi_click:
      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.2s
        then:
          - globals.set:
              id: pulse_offset
              value: !lambda 'return id(pulse_offset) + 1;'
          - script.execute: blink_pulse
          - logger.log: "MANUAL +1 L"
      - timing:
          - ON for at most 0.4s
          - OFF for at least 0.6s
        then:
          - script.execute: hint_doubletap

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 180°
    update_interval: 250ms
    lambda: |-
      if (id(ha_zaehlerstand).has_state()) {
        it.printf(0, 0, id(font_big), "%s", id(ha_zaehlerstand).state.c_str());
      } else {
        it.print(0, 0, id(font_big), "---");
      }
      if (id(show_hint)) {
        it.print(0, 28, id(font_small), "Doppeltippen!");
      } else {
        it.printf(0, 28, id(font_small), "%.1f L/min", id(flow).state);
      }
      if (id(blink_state)) {
        it.filled_circle(122, 6, 4);
      }

sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 10s

  - platform: pulse_meter
    name: "Wasser Durchfluss"
    id: flow
    pin:
      number: GPIO21
      mode:
        input: true
      inverted: true
    internal_filter: 13us
    timeout: 5min
    unit_of_measurement: "L/min"
    icon: "mdi:water-pump"
    accuracy_decimals: 1
    total:
      id: raw_total
      internal: true
      on_value:
        then:
          - script.execute: blink_pulse

  - platform: template
    name: "Wasser Impulse gesamt"
    id: water_total
    unit_of_measurement: "L"
    icon: "mdi:water"
    accuracy_decimals: 0
    device_class: water
    state_class: total_increasing
    update_interval: 1s
    lambda: |-
      return id(raw_total).state + id(pulse_offset);
