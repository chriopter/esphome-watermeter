esphome:
  name: wasserzaehler
  friendly_name: Wasserzähler

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Schritt 1: OLED Display
# SSD1306 128x64 auf GPIO0 (SDA) / GPIO1 (SCL), Adresse 0x3C
i2c:
  sda: GPIO0
  scl: GPIO1
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

# Schritt 4: TTP223 Touch-Buttons
# Minus auf GPIO3 (links), Plus auf GPIO4 (rechts)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
    name: "Button Minus"
    id: btn_minus
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        input: true
    name: "Button Plus"
    id: btn_plus

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 100ms
    lambda: |-
      it.print(0, 0, id(font_big), "99999.999");
      if (id(btn_minus).state) {
        it.print(0, 45, id(font_small), "LINKS");
      }
      if (id(btn_plus).state) {
        it.print(128, 45, id(font_small), TextAlign::TOP_RIGHT, "RECHTS");
      }

sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 10s

  # Schritt 2: Impulszähler am induktiven Sensor (NPN, active LOW)
  # 1 Impuls = 1 Liter. Externer 10 kΩ Pull-Up an GPIO5 → 3.3V.
  - platform: pulse_meter
    name: "Wasser Durchfluss"
    pin:
      number: GPIO5
      mode:
        input: true
      inverted: true
    internal_filter: 13us
    timeout: 5min
    unit_of_measurement: "L/min"
    icon: "mdi:water-pump"
    accuracy_decimals: 1
    total:
      name: "Wasser Impulse gesamt"
      unit_of_measurement: "L"
      icon: "mdi:water"
      accuracy_decimals: 0
      device_class: water
      state_class: total_increasing
      on_value:
        then:
          - logger.log:
              format: "PULSE! Total: %.0f L"
              args: ['x']
